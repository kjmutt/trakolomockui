<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trakolo — admin sign in</title>
<link rel="stylesheet" href="styles.css">
<script>(function(){try{var t=localStorage.getItem('trakolo-theme');if(t==='dark'||(t==='system'&&matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.dataset.theme='dark';var a=localStorage.getItem('trakolo-accent');if(a){a=JSON.parse(a);for(var k in a)document.documentElement.style.setProperty(k,a[k]);}}catch(e){}})();</script>
</head>
<body>
<div class="portal-header">
  <a class="brand" href="index.html">
    <svg width="24" height="24" viewBox="0 0 200 200"><rect x="8" y="8" width="184" height="184" rx="40" fill="#DEF6EC" stroke="#0C8266" stroke-width="6"/><path d="M55,150 L100,100 L150,50" fill="none" stroke="#0C8266" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/><circle cx="55" cy="150" r="16" fill="#5DCAA5" stroke="#0C8266" stroke-width="6"/><circle cx="100" cy="100" r="16" fill="#5DCAA5" stroke="#0C8266" stroke-width="6"/><circle cx="150" cy="50" r="21" fill="#0C8266" stroke="#0C8266" stroke-width="6"/></svg>
    <span class="brand-name">Trakolo</span>
    <span class="plat-tag" style="margin-left:10px;color:var(--violet-text);background:var(--violet-bg);border-color:#DAD7F7;">Admin console</span>
  </a>
  <div class="portal-links">
    <a href="contact.html">Need help?</a>
  </div>
</div>

<div class="portal-wrap">
  <div class="auth-card">
    <div class="auth-title">Sign in to admin</div>
    <div class="auth-sub">SLAs, routing, users, and portal configuration</div>

    <label style="margin-top:0;">Workspace</label>
    <input type="text" value="acme.trakolo.com">

    <button class="sso-btn" style="margin-top:16px;">
      <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="7.5" fill="#00297A"/><circle cx="8" cy="8" r="3" fill="#fff"/></svg>
      Continue with Okta
    </button>

    <div class="divider">or continue with email</div>

    <label>Admin email</label>
    <input type="text" placeholder="you@acme.com">
    <label>Password</label>
    <input type="text" placeholder="••••••••">
    <label>Verification code</label>
    <input type="text" placeholder="6-digit code from your authenticator app">

    <a class="btn primary" href="admin.html" style="width:100%;margin-top:20px;justify-content:center;">Sign in</a>

    <div class="hint" style="margin-top:18px;">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3" style="flex-shrink:0"><path d="M7 1.5l6 11h-12l6-11z"/><path d="M7 6v2.3M7 10.5v.01"/></svg>
      <span>Two-factor authentication is required for admin access.</span>
    </div>

    <div style="text-align:center;font-size:12px;color:var(--ink-muted);margin-top:16px;border-top:1px solid var(--border);padding-top:14px;">
      <a href="login.html" style="color:var(--indigo-text);text-decoration:none;">Choose a different sign-in</a>
    </div>
  </div>
</div>
</body>
</html>
