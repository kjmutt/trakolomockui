<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trakolo — product tree</title>
<link rel="stylesheet" href="styles.css">
<style>
  .tree-product{border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:12px;overflow:hidden;background:var(--surface);box-shadow:var(--shadow-sm);}
  .tree-product-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;cursor:pointer;}
  .tree-product-head:hover{background:var(--surface-2);}
  .tree-product-left{display:flex;align-items:center;gap:12px;}
  .tree-chevron{width:9px;height:9px;border-right:2px solid var(--ink-muted);border-bottom:2px solid var(--ink-muted);transform:rotate(-45deg);transition:transform .15s;flex-shrink:0;}
  .tree-product.open .tree-chevron{transform:rotate(45deg);}
  .tree-product-name{font-family:var(--font-display);font-weight:700;font-size:15px;}
  .tree-product-meta{font-size:12px;color:var(--ink-muted);margin-top:2px;}
  .tree-envs{display:none;border-top:1px solid var(--border);background:var(--surface-2);}
  .tree-product.open .tree-envs{display:block;}
  .tree-env{border-bottom:1px solid var(--border);}
  .tree-env:last-child{border-bottom:none;}
  .tree-env-head{display:flex;justify-content:space-between;align-items:center;padding:12px 20px 12px 44px;cursor:pointer;}
  .tree-env-head:hover{background:var(--surface);}
  .tree-env-left{display:flex;align-items:center;gap:10px;}
  .tree-chevron-sm{width:7px;height:7px;border-right:2px solid var(--ink-muted);border-bottom:2px solid var(--ink-muted);transform:rotate(-45deg);transition:transform .15s;flex-shrink:0;}
  .tree-env.open .tree-chevron-sm{transform:rotate(45deg);}
  .tree-env-name{font-family:var(--font-mono);font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-2);width:44px;}
  .tree-env-body{display:none;padding:2px 20px 16px 44px;}
  .tree-env.open .tree-env-body{display:block;}
  .tree-infra-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:12.5px;border-bottom:1px solid var(--border);}
  .tree-infra-row:last-child{border-bottom:none;}
</style>
</head>
<body>
<div class="topbar">
  <a class="brand" href="index.html">
    <svg width="24" height="24" viewBox="0 0 200 200"><rect x="8" y="8" width="184" height="184" rx="40" fill="#DEF6EC" stroke="#0C8266" stroke-width="6"/><path d="M55,150 L100,100 L150,50" fill="none" stroke="#0C8266" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/><circle cx="55" cy="150" r="16" fill="#5DCAA5" stroke="#0C8266" stroke-width="6"/><circle cx="100" cy="100" r="16" fill="#5DCAA5" stroke="#0C8266" stroke-width="6"/><circle cx="150" cy="50" r="21" fill="#0C8266" stroke="#0C8266" stroke-width="6"/></svg>
    <span class="brand-name">Trakolo</span>
  </a>
  <div class="mod-nav">
    <a href="desk-log-ticket.html">IT</a>
    <a href="sam.html">SAM</a>
    <a class="active" href="dev.html">Dev</a>
    <a href="ops.html">Ops</a>
    <a href="admin.html">Admin</a>
    <a href="portal-admin-login.html">Portal admin</a>
  </div>
  <div class="top-right"><div class="avatar">EM</div></div>
</div>
<div class="subnav">
  <a href="dev.html">Sprint board</a>
  <a href="dev-backlog.html">Backlog &amp; planning</a>
  <a href="dev-roadmap.html">Epics &amp; roadmap</a>
  <a href="dev-ownership.html">Team ownership</a>
  <a class="active" href="dev-product-tree.html">Product tree</a>
</div>

<div class="wrap">
  <div class="page-head">
    <div><div class="page-title">Product tree</div><div class="page-desc">Drill down: product → environment → infrastructure running there. Click any row to expand it.</div></div>
    <div style="display:flex;gap:8px;">
      <button class="btn sm" onclick="setAll(true)">Expand all</button>
      <button class="btn sm" onclick="setAll(false)">Collapse all</button>
    </div>
  </div>

  <div id="tree"></div>
</div>

<script>
const products = [
  {name:"Service desk", team:"Platform Reliability", teamHref:"dev-ownership.html#team-platform-reliability",
    infra:["API service","Ticket routing engine","SLA escalation worker"],
    envs:[
      {env:"DEV", status:"ok", statusLabel:"Healthy", version:"v2.15.0-dev.42", deployed:"12m ago"},
      {env:"INT", status:"ok", statusLabel:"Healthy", version:"v2.15.0-rc.3", deployed:"2h ago"},
      {env:"UAT", status:"ok", statusLabel:"Healthy", version:"v2.14.4", deployed:"1d ago"},
      {env:"PRE", status:"ok", statusLabel:"Healthy", version:"v2.14.3", deployed:"3d ago"},
      {env:"PROD", status:"ok", statusLabel:"Healthy", version:"v2.14.3", deployed:"3d ago"}
    ]},
  {name:"Boards & sprints", team:"Platform Reliability", teamHref:"dev-ownership.html#team-platform-reliability",
    infra:["Webhook delivery queue","GitHub integration"],
    envs:[
      {env:"DEV", status:"ok", statusLabel:"Healthy", version:"v2.15.0-dev.42", deployed:"12m ago"},
      {env:"INT", status:"ok", statusLabel:"Healthy", version:"v2.15.0-rc.3", deployed:"2h ago"},
      {env:"UAT", status:"ok", statusLabel:"Healthy", version:"v2.14.4", deployed:"1d ago"},
      {env:"PRE", status:"ok", statusLabel:"Healthy", version:"v2.14.3", deployed:"3d ago"},
      {env:"PROD", status:"ok", statusLabel:"Healthy", version:"v2.14.3", deployed:"3d ago"}
    ]},
  {name:"Asset management (SAM)", team:"Self-Service Experience", teamHref:"dev-ownership.html#team-self-service-experience",
    infra:["Asset renewal nightly scan","File storage"],
    envs:[
      {env:"DEV", status:"ok", statusLabel:"Healthy", version:"v1.8.0-dev.9", deployed:"40m ago"},
      {env:"INT", status:"ok", statusLabel:"Healthy", version:"v1.8.0-rc.1", deployed:"5h ago"},
      {env:"UAT", status:"warn", statusLabel:"Degraded", version:"v1.7.2", deployed:"2d ago", note:"Hotfix ahead of INT — patches a session-timeout bug found during sign-off."},
      {env:"PRE", status:"ok", statusLabel:"Healthy", version:"v1.7.1", deployed:"6d ago"},
      {env:"PROD", status:"ok", statusLabel:"Healthy", version:"v1.7.1", deployed:"6d ago"}
    ]},
  {name:"Self-service portal", team:"Self-Service Experience", teamHref:"dev-ownership.html#team-self-service-experience",
    infra:["Self-service portal","Azure AD onboarding automation"],
    envs:[
      {env:"DEV", status:"ok", statusLabel:"Healthy", version:"v1.8.0-dev.9", deployed:"40m ago"},
      {env:"INT", status:"ok", statusLabel:"Healthy", version:"v1.8.0-rc.1", deployed:"5h ago"},
      {env:"UAT", status:"warn", statusLabel:"Degraded", version:"v1.7.2", deployed:"2d ago", note:"Hotfix ahead of INT — patches a session-timeout bug found during sign-off."},
      {env:"PRE", status:"ok", statusLabel:"Healthy", version:"v1.7.1", deployed:"6d ago"},
      {env:"PROD", status:"ok", statusLabel:"Healthy", version:"v1.7.1", deployed:"6d ago"}
    ]},
  {name:"Reporting & compliance", team:"Compliance & Reporting", teamHref:"dev-ownership.html#team-compliance-reporting",
    infra:["Report export scheduler","Reporting dashboards"],
    envs:[
      {env:"DEV", status:"ok", statusLabel:"Healthy", version:"v0.9.0-dev.4", deployed:"3h ago"},
      {env:"INT", status:"ok", statusLabel:"Healthy", version:"v0.9.0-rc.2", deployed:"1d ago"},
      {env:"UAT", status:"ok", statusLabel:"Healthy", version:"v0.8.5", deployed:"4d ago"},
      {env:"PRE", status:"neutral", statusLabel:"Not deployed", version:"—", deployed:"—"},
      {env:"PROD", status:"neutral", statusLabel:"Not deployed", version:"—", deployed:"—"}
    ]},
  {name:"Change management (ITSM)", team:"Compliance & Reporting", teamHref:"dev-ownership.html#team-compliance-reporting",
    infra:["Change request workflow","CAB approval routing"],
    envs:[
      {env:"DEV", status:"ok", statusLabel:"Healthy", version:"v0.9.0-dev.4", deployed:"3h ago"},
      {env:"INT", status:"ok", statusLabel:"Healthy", version:"v0.9.0-rc.2", deployed:"1d ago"},
      {env:"UAT", status:"ok", statusLabel:"Healthy", version:"v0.8.5", deployed:"4d ago"},
      {env:"PRE", status:"neutral", statusLabel:"Not deployed", version:"—", deployed:"—"},
      {env:"PROD", status:"neutral", statusLabel:"Not deployed", version:"—", deployed:"—"}
    ]}
];

function render(){
  document.getElementById('tree').innerHTML = products.map((p, pi) => `
    <div class="tree-product" id="prod-${pi}">
      <div class="tree-product-head" onclick="toggle('prod-${pi}')">
        <div class="tree-product-left">
          <div class="tree-chevron"></div>
          <div>
            <div class="tree-product-name">${p.name}</div>
            <div class="tree-product-meta">Owned by <a href="${p.teamHref}" onclick="event.stopPropagation()" style="color:var(--indigo-text);">${p.team} →</a> · ${p.infra.length} infrastructure components</div>
          </div>
        </div>
        <span class="badge ${p.envs[4].status}">${p.envs[4].statusLabel} in PROD</span>
      </div>
      <div class="tree-envs">
        ${p.envs.map((e, ei) => `
          <div class="tree-env" id="prod-${pi}-env-${ei}">
            <div class="tree-env-head" onclick="toggle('prod-${pi}-env-${ei}')">
              <div class="tree-env-left">
                <div class="tree-chevron-sm"></div>
                <span class="tree-env-name">${e.env}</span>
                <span class="id-mono" style="color:var(--ink-2);">${e.version}</span>
              </div>
              <span class="badge ${e.status}">${e.statusLabel}</span>
            </div>
            <div class="tree-env-body">
              ${e.note ? `<div class="hint" style="margin-bottom:10px;"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3" style="flex-shrink:0"><path d="M7 1.5l6 11h-12l6-11z"/><path d="M7 6v2.3M7 10.5v.01"/></svg><span>${e.note}</span></div>` : ''}
              <div style="font-size:11px;color:var(--ink-muted);margin-bottom:8px;">Last deployed ${e.deployed} · Infrastructure running here:</div>
              ${p.infra.map(i => `<div class="tree-infra-row"><span>${i}</span><span class="id-mono" style="color:var(--ink-muted);">${e.version}</span></div>`).join('')}
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}
function toggle(id){
  document.getElementById(id).classList.toggle('open');
}
function setAll(open){
  document.querySelectorAll('.tree-product, .tree-env').forEach(el => el.classList.toggle('open', open));
}
render();
</script>
</body>
</html>
