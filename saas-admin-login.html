<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trakolo — platform admin</title>
<link rel="stylesheet" href="styles.css">
<style>
  .plat-auth{max-width:400px;margin:0 auto;padding:72px 24px;}
  .plat-card{background:#151F1B;border:1px solid #26362F;border-radius:16px;padding:32px 30px;}
  .plat-card label{color:#9FB3AA;}
  .plat-card input{background:#0E1613;border-color:#2B3B33;color:#EAF2ED;}
  .plat-card input::placeholder{color:#5C7268;}
  .plat-title{font-family:var(--font-display);font-size:20px;font-weight:700;text-align:center;color:#fff;}
  .plat-sub{font-size:12.5px;color:#8FA79C;text-align:center;margin-top:6px;margin-bottom:24px;}
</style>
</head>
<body class="platform-body">
<div class="platform-header">
  <a class="brand" href="index.html">
    <svg width="24" height="24" viewBox="0 0 200 200"><rect x="8" y="8" width="184" height="184" rx="40" fill="#1B2E27" stroke="#5DCAA5" stroke-width="6"/><path d="M55,150 L100,100 L150,50" fill="none" stroke="#5DCAA5" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/><circle cx="55" cy="150" r="16" fill="#5DCAA5"/><circle cx="100" cy="100" r="16" fill="#5DCAA5"/><circle cx="150" cy="50" r="21" fill="#5DCAA5"/></svg>
    <span class="brand-name">Trakolo</span>
    <span class="plat-tag">Platform</span>
  </a>
  <div class="top-right"><a href="login.html">← Choose a different sign-in</a></div>
</div>

<div class="plat-auth">
  <div class="plat-card">
    <div class="plat-title">Platform admin</div>
    <div class="plat-sub">Restricted to Trakolo staff. All access is logged.</div>

    <label style="margin-top:0;">Work email</label>
    <input type="text" placeholder="you@trakolo.com">
    <label>Password</label>
    <input type="text" placeholder="••••••••">
    <label>Security key or authenticator code</label>
    <input type="text" placeholder="Tap your key, or enter a code">

    <a class="btn primary" href="saas-admin-console.html" style="width:100%;margin-top:20px;justify-content:center;background:#1D9E75;border-color:#1D9E75;">Sign in</a>

    <div style="font-size:11.5px;color:#6E8880;text-align:center;margin-top:18px;line-height:1.6;">
      This console can view and act on any tenant's workspace.<br>Access requires hardware-key 2FA and is audit-logged.
    </div>
  </div>
</div>
</body>
</html>
