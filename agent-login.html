<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trakolo — agent sign in</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="portal-header">
  <a class="brand" href="index.html">
    <svg width="24" height="24" viewBox="0 0 200 200"><rect x="8" y="8" width="184" height="184" rx="40" fill="#DEF6EC" stroke="#0C8266" stroke-width="6"/><path d="M55,150 L100,100 L150,50" fill="none" stroke="#0C8266" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/><circle cx="55" cy="150" r="16" fill="#5DCAA5" stroke="#0C8266" stroke-width="6"/><circle cx="100" cy="100" r="16" fill="#5DCAA5" stroke="#0C8266" stroke-width="6"/><circle cx="150" cy="50" r="21" fill="#0C8266" stroke="#0C8266" stroke-width="6"/></svg>
    <span class="brand-name">Trakolo</span>
    <span class="plat-tag" style="margin-left:10px;color:var(--indigo-text);background:var(--indigo-bg);border-color:#C7E4DA;">Agent workspace</span>
  </a>
  <div class="portal-links">
    <a href="contact.html">Need help?</a>
  </div>
</div>

<div class="portal-wrap">
  <div class="auth-card">
    <div class="auth-title">Sign in to your workspace</div>
    <div class="auth-sub">Service desk, assets, boards &amp; sprints, and reporting</div>

    <label style="margin-top:0;">Workspace</label>
    <input type="text" value="acme.trakolo.com">

    <button class="sso-btn" style="margin-top:16px;">
      <svg width="16" height="16" viewBox="0 0 16 16"><path fill="#4285F4" d="M15.7 8.2c0-.6-.05-1.1-.15-1.6H8v3h4.3a3.7 3.7 0 01-1.6 2.4v2h2.6c1.5-1.4 2.4-3.5 2.4-5.8z"/><path fill="#34A853" d="M8 16c2.2 0 4-.7 5.3-2l-2.6-2c-.7.5-1.6.8-2.7.8-2.1 0-3.8-1.4-4.5-3.3H.8v2.1A8 8 0 008 16z"/><path fill="#FBBC05" d="M3.5 9.5A4.8 4.8 0 013.2 8c0-.5.1-1 .3-1.5V4.4H.8A8 8 0 000 8c0 1.3.3 2.5.8 3.6l2.7-2.1z"/><path fill="#EA4335" d="M8 3.2c1.2 0 2.3.4 3.1 1.2l2.3-2.3C11.9.7 10.1 0 8 0A8 8 0 00.8 4.4l2.7 2.1C4.2 4.6 5.9 3.2 8 3.2z"/></svg>
      Continue with Google Workspace
    </button>
    <button class="sso-btn">
      <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="7.5" fill="#00297A"/><circle cx="8" cy="8" r="3" fill="#fff"/></svg>
      Continue with Okta
    </button>

    <div class="divider">or continue with email</div>

    <label>Email</label>
    <input type="text" placeholder="you@acme.com">
    <label>Password</label>
    <input type="text" placeholder="••••••••">

    <a class="btn primary" href="desk.html" style="width:100%;margin-top:20px;justify-content:center;">Sign in</a>

    <div style="text-align:center;font-size:12px;color:var(--ink-muted);margin-top:20px;border-top:1px solid var(--border);padding-top:14px;">
      Looking to log a request instead? <a href="ssp-login.html" style="color:var(--indigo-text);text-decoration:none;">Go to the self-service portal</a>
      · <a href="login.html" style="color:var(--indigo-text);text-decoration:none;">Choose a different sign-in</a>
    </div>
  </div>
</div>
</body>
</html>
